<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ورشة شويخ - إدارة تصليح المحركات</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      :root {
        --bg-primary: #0f172a;
        --bg-secondary: #1e293b;
        --bg-card: #1e293b;
        --bg-card-hover: #334155;
        --bg-glass: rgba(30, 41, 59, 0.8);
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --border-color: #334155;
        --accent-blue: #3b82f6;
        --accent-green: #10b981;
        --accent-red: #ef4444;
        --accent-yellow: #f59e0b;
        --accent-purple: #8b5cf6;
        --accent-orange: #f97316;
        --accent-cyan: #06b6d4;
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        --radius: 12px;
        --transition: all 0.3s ease;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Cairo", sans-serif;
        background: linear-gradient(
          135deg,
          var(--bg-primary) 0%,
          var(--bg-secondary) 100%
        );
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-primary);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--accent-blue);
        border-radius: 3px;
      }

      /* Toast Notifications */
      .toast-container {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10000;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .toast {
        padding: 12px 24px;
        border-radius: 8px;
        color: white;
        font-weight: 600;
        animation: slideDown 0.3s ease;
        min-width: 300px;
        text-align: center;
        box-shadow: var(--shadow-lg);
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: center;
      }
      .toast.success {
        background: var(--accent-green);
      }
      .toast.error {
        background: var(--accent-red);
      }
      .toast.warning {
        background: var(--accent-yellow);
        color: #1a1a1a;
      }
      .toast.info {
        background: var(--accent-blue);
      }
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Login Page */
      .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          #0f172a 0%,
          #1e293b 50%,
          #0f172a 100%
        );
        padding: 20px;
      }
      .login-container {
        background: var(--bg-glass);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: var(--shadow-lg);
      }
      .login-logo {
        text-align: center;
        margin-bottom: 30px;
      }
      .login-logo i {
        font-size: 48px;
        color: var(--accent-blue);
        margin-bottom: 10px;
        display: block;
      }
      .login-logo h1 {
        font-size: 28px;
        font-weight: 800;
        background: linear-gradient(
          135deg,
          var(--accent-blue),
          var(--accent-cyan)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .login-logo p {
        color: var(--text-secondary);
        font-size: 14px;
      }

      .login-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
      }
      .login-tab {
        flex: 1;
        padding: 10px;
        border: 2px solid var(--border-color);
        border-radius: 10px;
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        font-family: "Cairo";
        font-weight: 600;
        font-size: 14px;
        transition: var(--transition);
      }
      .login-tab.active {
        border-color: var(--accent-blue);
        color: var(--accent-blue);
        background: rgba(59, 130, 246, 0.1);
      }

      .form-group {
        margin-bottom: 18px;
      }
      .form-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        font-size: 14px;
        color: var(--text-secondary);
      }
      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 12px 16px;
        border-radius: 10px;
        border: 2px solid var(--border-color);
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: "Cairo";
        font-size: 14px;
        transition: var(--transition);
        outline: none;
      }
      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        border-color: var(--accent-blue);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
      }
      .form-group textarea {
        resize: vertical;
        min-height: 80px;
      }

      .btn {
        padding: 12px 24px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-family: "Cairo";
        font-weight: 700;
        font-size: 14px;
        transition: var(--transition);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent-blue), #2563eb);
        color: white;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
      }
      .btn-success {
        background: linear-gradient(135deg, var(--accent-green), #059669);
        color: white;
        box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
      }
      .btn-success:hover {
        transform: translateY(-2px);
      }
      .btn-danger {
        background: linear-gradient(135deg, var(--accent-red), #dc2626);
        color: white;
        box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
      }
      .btn-danger:hover {
        transform: translateY(-2px);
      }
      .btn-warning {
        background: linear-gradient(135deg, var(--accent-yellow), #d97706);
        color: white;
        box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
      }
      .btn-warning:hover {
        transform: translateY(-2px);
      }
      .btn-secondary {
        background: var(--bg-card);
        color: var(--text-primary);
        border: 2px solid var(--border-color);
      }
      .btn-secondary:hover {
        border-color: var(--accent-blue);
      }
      .btn-full {
        width: 100%;
      }
      .btn-sm {
        padding: 8px 16px;
        font-size: 12px;
      }

      /* App Layout */
      .app-layout {
        display: flex;
        min-height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        width: 260px;
        background: var(--bg-glass);
        backdrop-filter: blur(20px);
        border-left: 1px solid var(--border-color);
        padding: 20px 0;
        position: fixed;
        right: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
        transition: var(--transition);
        overflow-y: auto;
      }
      .sidebar-header {
        padding: 0 20px 20px;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 10px;
      }
      .sidebar-header h2 {
        font-size: 20px;
        font-weight: 800;
        background: linear-gradient(
          135deg,
          var(--accent-blue),
          var(--accent-cyan)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .sidebar-header p {
        font-size: 12px;
        color: var(--text-muted);
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 20px;
        color: var(--text-secondary);
        cursor: pointer;
        transition: var(--transition);
        border-right: 3px solid transparent;
        font-weight: 600;
        font-size: 14px;
        position: relative;
      }
      .nav-item:hover {
        background: rgba(59, 130, 246, 0.1);
        color: var(--text-primary);
      }
      .nav-item.active {
        background: rgba(59, 130, 246, 0.15);
        color: var(--accent-blue);
        border-right-color: var(--accent-blue);
      }
      .nav-item i {
        width: 20px;
        text-align: center;
      }
      .nav-item .badge {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        background: var(--accent-red);
        color: white;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 10px;
        min-width: 18px;
        text-align: center;
      }

      .sidebar-footer {
        margin-top: auto;
        padding: 15px 20px;
        border-top: 1px solid var(--border-color);
      }
      .user-info {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .user-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--accent-blue),
          var(--accent-purple)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 16px;
      }
      .user-details h4 {
        font-size: 14px;
        font-weight: 700;
      }
      .user-details p {
        font-size: 11px;
        color: var(--text-muted);
      }

      /* Main Content */
      .main-content {
        flex: 1;
        margin-right: 260px;
        padding: 20px;
      }

      /* Header */
      .top-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 25px;
        padding: 15px 20px;
        background: var(--bg-glass);
        backdrop-filter: blur(20px);
        border-radius: var(--radius);
        border: 1px solid var(--border-color);
      }
      .top-header h1 {
        font-size: 22px;
        font-weight: 800;
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .notification-bell {
        position: relative;
        cursor: pointer;
        padding: 8px;
        color: var(--text-secondary);
        transition: var(--transition);
      }
      .notification-bell:hover {
        color: var(--accent-yellow);
      }
      .notification-bell i {
        font-size: 20px;
      }
      .notification-bell .notif-count {
        position: absolute;
        top: 0;
        left: 0;
        background: var(--accent-red);
        color: white;
        font-size: 10px;
        font-weight: 700;
        padding: 1px 5px;
        border-radius: 10px;
        min-width: 16px;
        text-align: center;
        display: none;
      }
      .notification-bell .notif-count.show {
        display: block;
      }

      /* Notification Dropdown */
      .notif-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        width: 350px;
        max-height: 400px;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        box-shadow: var(--shadow-lg);
        z-index: 1000;
        display: none;
        overflow: hidden;
      }
      .notif-dropdown.show {
        display: block;
      }
      .notif-dropdown-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .notif-dropdown-header h4 {
        font-size: 14px;
      }
      .notif-dropdown-header button {
        background: none;
        border: none;
        color: var(--accent-blue);
        cursor: pointer;
        font-family: "Cairo";
        font-size: 12px;
      }
      .notif-dropdown-list {
        max-height: 300px;
        overflow-y: auto;
      }
      .notif-dropdown-item {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border-color);
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        gap: 10px;
      }
      .notif-dropdown-item:hover {
        background: rgba(59, 130, 246, 0.1);
      }
      .notif-dropdown-item.unread {
        background: rgba(59, 130, 246, 0.05);
      }
      .notif-dropdown-item .notif-icon {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 14px;
      }
      .notif-dropdown-item .notif-content {
        flex: 1;
      }
      .notif-dropdown-item .notif-content h5 {
        font-size: 13px;
        font-weight: 600;
      }
      .notif-dropdown-item .notif-content p {
        font-size: 11px;
        color: var(--text-muted);
      }
      .notif-dropdown-footer {
        padding: 10px;
        text-align: center;
        border-top: 1px solid var(--border-color);
      }
      .notif-dropdown-footer a {
        color: var(--accent-blue);
        font-size: 13px;
        cursor: pointer;
        text-decoration: none;
        font-weight: 600;
      }

      /* Cards */
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        padding: 20px;
        transition: var(--transition);
      }
      .card:hover {
        border-color: rgba(59, 130, 246, 0.3);
        box-shadow: var(--shadow-lg);
      }
      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }
      .card-header h3 {
        font-size: 16px;
        font-weight: 700;
      }

      /* Stats Grid */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-bottom: 25px;
      }
      .stat-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        padding: 20px;
        transition: var(--transition);
        position: relative;
        overflow: hidden;
      }
      .stat-card::before {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        width: 4px;
        height: 100%;
        border-radius: 0 var(--radius) var(--radius) 0;
      }
      .stat-card.blue::before {
        background: var(--accent-blue);
      }
      .stat-card.green::before {
        background: var(--accent-green);
      }
      .stat-card.red::before {
        background: var(--accent-red);
      }
      .stat-card.yellow::before {
        background: var(--accent-yellow);
      }
      .stat-card.purple::before {
        background: var(--accent-purple);
      }
      .stat-card.orange::before {
        background: var(--accent-orange);
      }
      .stat-card .stat-icon {
        font-size: 28px;
        margin-bottom: 10px;
      }
      .stat-card.blue .stat-icon {
        color: var(--accent-blue);
      }
      .stat-card.green .stat-icon {
        color: var(--accent-green);
      }
      .stat-card.red .stat-icon {
        color: var(--accent-red);
      }
      .stat-card.yellow .stat-icon {
        color: var(--accent-yellow);
      }
      .stat-card.purple .stat-icon {
        color: var(--accent-purple);
      }
      .stat-card.orange .stat-icon {
        color: var(--accent-orange);
      }
      .stat-card .stat-value {
        font-size: 28px;
        font-weight: 800;
      }
      .stat-card .stat-label {
        font-size: 13px;
        color: var(--text-muted);
        font-weight: 600;
      }

      /* Table */
      .table-container {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        padding: 12px 16px;
        text-align: right;
        font-weight: 700;
        font-size: 13px;
        color: var(--text-muted);
        border-bottom: 2px solid var(--border-color);
      }
      td {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-color);
        font-size: 14px;
      }
      tr:hover td {
        background: rgba(59, 130, 246, 0.05);
      }

      /* Status Badges */
      .status-badge {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      .status-badge.unrepaired {
        background: rgba(239, 68, 68, 0.15);
        color: var(--accent-red);
      }
      .status-badge.in_progress {
        background: rgba(245, 158, 11, 0.15);
        color: var(--accent-yellow);
      }
      .status-badge.ready {
        background: rgba(16, 185, 129, 0.15);
        color: var(--accent-green);
      }
      .status-badge.delivered {
        background: rgba(59, 130, 246, 0.15);
        color: var(--accent-blue);
      }

      /* Customer Sections */
      .customer-sections {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
      }
      .customer-section {
        border-radius: var(--radius);
        padding: 20px;
        border: 1px solid;
        transition: var(--transition);
      }
      .customer-section:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-lg);
      }
      .customer-section.green {
        background: rgba(16, 185, 129, 0.08);
        border-color: rgba(16, 185, 129, 0.3);
      }
      .customer-section.red {
        background: rgba(239, 68, 68, 0.08);
        border-color: rgba(239, 68, 68, 0.3);
      }
      .customer-section.blue {
        background: rgba(59, 130, 246, 0.08);
        border-color: rgba(59, 130, 246, 0.3);
      }
      .customer-section.orange {
        background: rgba(249, 115, 22, 0.08);
        border-color: rgba(249, 115, 22, 0.3);
      }
      .customer-section .section-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 15px;
      }
      .customer-section .section-header i {
        font-size: 24px;
      }
      .customer-section.green .section-header i {
        color: var(--accent-green);
      }
      .customer-section.red .section-header i {
        color: var(--accent-red);
      }
      .customer-section.blue .section-header i {
        color: var(--accent-blue);
      }
      .customer-section.orange .section-header i {
        color: var(--accent-orange);
      }
      .customer-section .section-header h3 {
        font-size: 16px;
        font-weight: 700;
      }
      .customer-section .section-count {
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 10px;
      }
      .customer-section.green .section-count {
        color: var(--accent-green);
      }
      .customer-section.red .section-count {
        color: var(--accent-red);
      }
      .customer-section.blue .section-count {
        color: var(--accent-blue);
      }
      .customer-section.orange .section-count {
        color: var(--accent-orange);
      }

      /* Pump Item */
      .pump-item {
        background: var(--bg-primary);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: var(--transition);
        border: 1px solid transparent;
      }
      .pump-item:hover {
        border-color: var(--border-color);
      }
      .pump-info h4 {
        font-size: 14px;
        font-weight: 600;
      }
      .pump-info p {
        font-size: 12px;
        color: var(--text-muted);
      }

      /* Messages */
      .chat-container {
        display: flex;
        height: calc(100vh - 160px);
        gap: 15px;
      }
      .chat-list {
        width: 280px;
        background: var(--bg-card);
        border-radius: var(--radius);
        border: 1px solid var(--border-color);
        overflow-y: auto;
        flex-shrink: 0;
      }
      .chat-item {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-color);
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .chat-item:hover {
        background: rgba(59, 130, 246, 0.1);
      }
      .chat-item.active {
        background: rgba(59, 130, 246, 0.15);
      }
      .chat-item .chat-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--accent-blue),
          var(--accent-purple)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        flex-shrink: 0;
      }
      .chat-item .chat-preview {
        flex: 1;
        overflow: hidden;
      }
      .chat-item .chat-preview h4 {
        font-size: 14px;
        font-weight: 600;
      }
      .chat-item .chat-preview p {
        font-size: 12px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .chat-item .unread-dot {
        width: 10px;
        height: 10px;
        background: var(--accent-blue);
        border-radius: 50%;
        flex-shrink: 0;
      }

      .chat-window {
        flex: 1;
        background: var(--bg-card);
        border-radius: var(--radius);
        border: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
      }
      .chat-header-bar {
        padding: 15px 20px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .chat-messages {

    <script>
      // ==========================================
      // ورشة شويخ - نظام إدارة تصليح المحركات
      // Full Application with IndexedDB
      // ==========================================

      const APP_NAME = "ورشة شويخ";
      const CURRENCY = "د.ج";

      // ==========================================
      // DATABASE LAYER (IndexedDB)
      // ==========================================
      class Database {
        constructor() {
          this.dbName = "workshopDB";
          this.dbVersion = 3;
          this.db = null;
        }

        async init() {
          return new Promise((resolve, reject) => {
            const request = indexedDB.open(this.dbName, this.dbVersion);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
              this.db = request.result;
              resolve();
            };
            request.onupgradeneeded = (e) => {
              const db = e.target.result;
              const stores = [
                {
                  name: "users",
                  keyPath: "id",
                  indexes: [
                    ["username", "username", { unique: true }],
                    ["user_type", "user_type", {}],
                    ["phone", "phone", {}],
                  ],
                },
                {
                  name: "pumps",
                  keyPath: "id",
                  indexes: [
                    ["customer_id", "customer_id", {}],
                    ["technician_id", "technician_id", {}],
                    ["status", "status", {}],
                  ],
                },
                {
                  name: "spare_parts",
                  keyPath: "id",
                  indexes: [
                    ["pump_id", "pump_id", {}],
                    ["available", "available", {}],
                  ],
                },
                {
                  name: "messages",
                  keyPath: "id",
                  indexes: [
                    ["sender_id", "sender_id", {}],
                    ["receiver_id", "receiver_id", {}],
                    ["pump_id", "pump_id", {}],
                  ],
                },
                {
                  name: "notifications",
                  keyPath: "id",
                  indexes: [
                    ["user_id", "user_id", {}],
                    ["read", "read", {}],
                    ["type", "type", {}],
                  ],
                },
                {
                  name: "debts",
                  keyPath: "id",
                  indexes: [
                    ["customer_id", "customer_id", {}],
                    ["pump_id", "pump_id", {}],
                  ],
                },
                {
                  name: "debt_payments",
                  keyPath: "id",
                  indexes: [["debt_id", "debt_id", {}]],
                },
                {
                  name: "debt_reminders_log",
                  keyPath: "id",
                  indexes: [["debt_id", "debt_id", {}]],
                },
                { name: "sessions", keyPath: "id" },
              ];
              stores.forEach((s) => {
                if (!db.objectStoreNames.contains(s.name)) {
                  const store = db.createObjectStore(s.name, {
                    keyPath: s.keyPath,
                    autoIncrement: true,
                  });
                  s.indexes.forEach((idx) => {
                    try {
                      store.createIndex(idx[0], idx[1], idx[2]);
                    } catch (e) {}
                  });
                }
              });
            };
          });
        }

        _tx(storeName, mode = "readonly") {
          const tx = this.db.transaction(storeName, mode);
          return tx.objectStore(storeName);
        }

        async add(storeName, data) {
          return new Promise((resolve, reject) => {
            const store = this._tx(storeName, "readwrite");
            data.id = Date.now() + Math.random();
            const req = store.add(data);
            req.onsuccess = () => resolve(data);
            req.onerror = () => reject(req.error);
          });
        }

        async put(storeName, data) {
          return new Promise((resolve, reject) => {
            const store = this._tx(storeName, "readwrite");
            const req = store.put(data);
            req.onsuccess = () => resolve(data);
            req.onerror = () => reject(req.error);
          });
        }

        async get(storeName, id) {
          return new Promise((resolve, reject) => {
            const store = this._tx(storeName);
            const req = store.get(id);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
          });
        }

        async getAll(storeName) {
          return new Promise((resolve, reject) => {
            const store = this._tx(storeName);
            const req = store.getAll();
            req.onsuccess = () => resolve(req.result || []);
            req.onerror = () => reject(req.error);
          });
        }

        async getByIndex(storeName, indexName, value) {
          return new Promise((resolve, reject) => {
            const store = this._tx(storeName);
            const index = store.index(indexName);
            const req = index.getAll(value);
            req.onsuccess = () => resolve(req.result || []);
            req.onerror = () => reject(req.error);
          });
        }

        async delete(storeName, id) {
          return new Promise((resolve, reject) => {
            const store = this._tx(storeName, "readwrite");
            const req = store.delete(id);
            req.onsuccess = () => resolve();
            req.onerror = () => reject(req.error);
          });
        }

        async findOne(storeName, predicate) {
          const all = await this.getAll(storeName);
          return all.find(predicate);
        }

        async filter(storeName, predicate) {
          const all = await this.getAll(storeName);
          return all.filter(predicate);
        }

        async count(storeName, predicate) {
          if (!predicate) {
            const all = await this.getAll(storeName);
            return all.length;
          }
          const filtered = await this.filter(storeName, predicate);
          return filtered.length;
        }
      }

      function getNextReminderDate(frequency, day) {
        const now = new Date();
        if (frequency === "weekly") {
          const d = new Date(now);
          d.setDate(d.getDate() + ((day - d.getDay() + 7) % 7 || 7));
          return d.toISOString();
        } else if (frequency === "monthly") {
          const d = new Date(now.getFullYear(), now.getMonth(), day);
          if (d <= now) d.setMonth(d.getMonth() + 1);
          return d.toISOString();
        }
        return "";
      }

      // ==========================================

      // ==========================================
      function showToast(message, type = "info") {
        const container = document.getElementById("toastContainer");
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        const icons = {
          success: "fa-check-circle",
          error: "fa-times-circle",
          warning: "fa-exclamation-triangle",
          info: "fa-info-circle",
        };
        toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${message}`;
        container.appendChild(toast);
        setTimeout(() => {
          toast.remove();
        }, 3500);
      }

      // ==========================================
      function formatDate(dateStr) {
        if (!dateStr) return "-";
        const d = new Date(dateStr);
        return d.toLocaleDateString("ar-DZ", {
          year: "numeric",
          month: "short",
          day: "numeric",
        });
      }

      function formatDateTime(dateStr) {
        if (!dateStr) return "-";
        const d = new Date(dateStr);
        return d.toLocaleDateString("ar-DZ", {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function formatMoney(amount) {
        return Number(amount || 0).toLocaleString("ar-DZ") + " " + CURRENCY;
      }

      function statusText(status) {
        const map = {
          unrepaired: "غير مصلح",
          in_progress: "قيد التصليح",
          ready: "جاهز للاستلام",
          delivered: "تم التسليم",
        };
        return map[status] || status;
      }

      function statusClass(status) {
        return status;
      }

        const days = [
          "الأحد",
          "الإثنين",
          "الثلاثاء",
          "الأربعاء",
          "الخميس",
          "الجمعة",

        ];
        return days[dayNum] || "";

        if (notifInterval) clearInterval(notifInterval);
        updateNotifBell();
        notifInterval = setInterval(updateNotifBell, 15000);
      }

      async function updateNotifBell() {
        if (!currentUser) return;
        const notifs = await db.filter(
          "notifications",
          (n) => n.user_id === currentUser.id && !n.read,
        );
        const countEl = document.querySelector(".notif-count");
        if (countEl) {
          if (notifs.length > 0) {
            countEl.textContent = notifs.length;
            countEl.classList.add("show");
          } else {
            countEl.classList.remove("show");
          }
        }
        // Also update sidebar badge for messages
        const msgs = await db.filter(
          "messages",
          (m) => m.receiver_id === currentUser.id && !m.read,
        );
        const msgBadge = document.querySelector(".msg-badge");
        if (msgBadge) {
          if (msgs.length > 0) {
            msgBadge.textContent = msgs.length;
            msgBadge.style.display = "block";
          } else {
            msgBadge.style.display = "none";
          }
        }
      }

      // ==========================================
      // DEBT REMINDER PROCESSING
      // ==========================================
      async function processReminders() {
        const debts = await db.filter(
          "debts",
          (d) =>
            d.reminder_enabled &&
            d.remaining_amount > 0 &&
            d.next_reminder_date,
        );
        const now = new Date();
        for (const debt of debts) {
          if (new Date(debt.next_reminder_date) <= now) {
            const customer = await db.get("users", debt.customer_id);
            // Send notification
            await db.add("notifications", {
              user_id: debt.customer_id,
              title: "تذكير بالدين المستحق",
              message: `لديك دين مستحق بقيمة ${formatMoney(debt.remaining_amount)}. يرجى التسديد في أقرب وقت.`,
              type: "warning",
              priority: "urgent",
              icon: "fa-money-bill-wave",
              read: false,
              created_at: new Date().toISOString(),
            });
            // Log
            await db.add("debt_reminders_log", {
              debt_id: debt.id,
              type: debt.reminder_frequency,
              date: new Date().toISOString(),
              remaining_amount: debt.remaining_amount,
            });
            // Update next reminder
            debt.last_reminder_date = new Date().toISOString();
            debt.next_reminder_date = getNextReminderDate(
              debt.reminder_frequency,
              debt.reminder_day,
            );
            await db.put("debts", debt);
          }
        }
      }

      async function loadTechAdminPage() {

      async function renderAdminDashboard(el) {

        );

        const inProg = pumps.filter((p) => p.status === "in_progress").length;
        const ready = pumps.filter((p) => p.status === "ready").length;
        const delivered = pumps.filter((p) => p.status === "delivered").length;
        const missingParts = await db.filter(
          "spare_parts",
          (sp) => !sp.available,
        );

        el.innerHTML = `
        <div class="stats-grid">
            <div class="stat-card blue">
                <div class="stat-icon"><i class="fas fa-cogs"></i></div>

                <div class="stat-value">${ready}</div>
                <div class="stat-label">جاهزة للاستلام</div>
            </div>
            <div class="stat-card purple">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-value">${customers.length}</div>
                <div class="stat-label">الزبائن</div>
            </div>
            <div class="stat-card orange">
                <div class="stat-icon"><i class="fas fa-money-bill-wave"></i></div>
                <div class="stat-value">${formatMoney(totalDebt)}</div>
                <div class="stat-label">إجمالي الديون</div>
            </div>
            <div class="stat-card yellow">
                <div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
                <div class="stat-value">${missingParts.length}</div>
                <div class="stat-label">قطع غيار ناقصة</div>
            </div>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-header"><h3><i class="fas fa-clock" style="color:var(--accent-yellow);margin-left:8px;"></i> آخر المحركات المضافة</h3></div>
                <div id="recentPumps"></div>
            </div>
            <div class="card">
                <div class="card-header"><h3><i class="fas fa-exclamation-circle" style="color:var(--accent-red);margin-left:8px;"></i> ديون مستحقة</h3></div>
                <div id="recentDebts"></div>
            </div>
        </div>`;

        const recentPumps = pumps
          .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
          .slice(0, 5);
        const pumpsEl = document.getElementById("recentPumps");
        for (const p of recentPumps) {
          const cust = await db.get("users", p.customer_id);
          pumpsEl.innerHTML += `
            <div class="pump-item">
                <div class="pump-info">
                    <h4>${p.name}</h4>
                    <p>${cust ? cust.name : "غير معروف"} - ${p.type}</p>
                </div>
                <span class="status-badge ${statusClass(p.status)}">${statusText(p.status)}</span>
            </div>`;
        }

        const activeDebts = debts
          .filter((d) => d.remaining_amount > 0)
          .slice(0, 5);
        const debtsEl = document.getElementById("recentDebts");
        if (activeDebts.length === 0) {
          debtsEl.innerHTML =
            '<div class="empty-state"><p>لا توجد ديون</p></div>';
        } else {
          for (const d of activeDebts) {
            const cust = await db.get("users", d.customer_id);
            debtsEl.innerHTML += `
                <div class="pump-item">
                    <div class="pump-info">
                        <h4>${cust ? cust.name : "غير معروف"}</h4>
                        <p>المتبقي: ${formatMoney(d.remaining_amount)}</p>
                    </div>
                    <span class="status-badge unrepaired">مستحق</span>
                </div>`;
          }
        }
      }

      let sparePartsFields = [];
      window.addSparePartField = function () {
        const idx = sparePartsFields.length;
        sparePartsFields.push(idx);
        const container = document.getElementById("sparePartsList");
        const div = document.createElement("div");
        div.className = "spare-part-item";
        div.id = `sp_${idx}`;
        div.innerHTML = `
            <input type="text" placeholder="اسم القطعة" class="sp-name" style="flex:2;padding:8px;border-radius:6px;border:1px solid var(--border-color);background:var(--bg-secondary);color:var(--text-primary);font-family:Cairo;">
            <input type="number" placeholder="الكمية" class="sp-qty" value="1" min="1" style="width:70px;padding:8px;border-radius:6px;border:1px solid var(--border-color);background:var(--bg-secondary);color:var(--text-primary);font-family:Cairo;">
            <input type="number" placeholder="السعر" class="sp-price" style="width:100px;padding:8px;border-radius:6px;border:1px solid var(--border-color);background:var(--bg-secondary);color:var(--text-primary);font-family:Cairo;">
            <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--accent-red);cursor:pointer;">
                <input type="checkbox" class="sp-unavailable"> غير متوفرة
            </label>
            <button onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--accent-red);cursor:pointer;font-size:16px;"><i class="fas fa-trash"></i></button>
        `;
        container.appendChild(div);
      };

      window.searchCustomers = async function () {
        const q = document
          .getElementById("customerSearch")
          .value.trim()
          .toLowerCase();
        const ac = document.getElementById("customerAutocomplete");
        if (q.length < 1) {
          ac.classList.remove("show");
          return;
        }
        const customers = await db.filter(
          "users",
          (u) =>
            u.user_type === "customer" &&
            (u.name.toLowerCase().includes(q) || u.phone.includes(q)),
        );
        if (customers.length === 0) {
          ac.innerHTML =
            '<div class="autocomplete-item" style="color:var(--text-muted)">لا نتائج</div>';
          ac.classList.add("show");
          return;
        }
        ac.innerHTML = customers
          .map(
            (c) => `
            <div class="autocomplete-item" onclick="selectCustomer(${c.id}, '${c.name}', '${c.phone}')">
                <strong>${c.name}</strong> - ${c.phone}
            </div>
        `,
          )
          .join("");
        ac.classList.add("show");
      };

      window.selectCustomer = function (id, name, phone) {
        document.getElementById("selectedCustomerId").value = id;
        document.getElementById("customerSearch").value = name;
        document.getElementById("selectedCustomerName").textContent = name;
        document.getElementById("selectedCustomerPhone").textContent = phone;
        document
          .getElementById("selectedCustomerInfo")
          .classList.remove("hidden");
        document
          .getElementById("customerAutocomplete")
          .classList.remove("show");
      };

      window.showAddCustomerInline = function () {
        document.getElementById("newCustomerForm").classList.toggle("hidden");
      };

      window.addInlineCustomer = async function () {
        const name = document.getElementById("newCustName").value.trim();
        const phone = document.getElementById("newCustPhone").value.trim();
        const username = document
          .getElementById("newCustUsername")
          .value.trim();
        const password = document
          .getElementById("newCustPassword")
          .value.trim();
        if (!name || !phone || !username || !password) {
          showToast("يرجى ملء جميع حقول الزبون", "warning");
          return;
        }
        const exists = await db.findOne(
          "users",
          (u) => u.username === username,
        );
        if (exists) {
          showToast("اسم المستخدم موجود مسبقاً", "error");
          return;
        }
        const customer = await db.add("users", {
          username,
          password,
          name,
          phone,
          user_type: "customer",
          created_at: new Date().toISOString(),
        });
        selectCustomer(customer.id, customer.name, customer.phone);
        document.getElementById("newCustomerForm").classList.add("hidden");
        showToast("تم إضافة الزبون بنجاح", "success");
      };

      window.previewImage = function (event) {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = document.getElementById("imagePreview");
            img.src = e.target.result;
            img.classList.remove("hidden");
          };
          reader.readAsDataURL(file);
        }
      };

      window.savePump = async function () {
        const customerId = parseFloat(
          document.getElementById("selectedCustomerId").value,
        );
        const name = document.getElementById("pumpName").value.trim();
        const type = document.getElementById("pumpType").value;
        const power = document.getElementById("pumpPower").value.trim();
        const fault = document.getElementById("pumpFault").value.trim();
        const deliveryDate = document.getElementById("pumpDeliveryDate").value;
        const imageEl = document.getElementById("imagePreview");

        if (!customerId || !name || !type) {
          showToast("يرجى اختيار الزبون وملء اسم ونوع المحرك", "warning");
          return;
        }

        const pump = await db.add("pumps", {
          name,
          type,
          power,
          status: "unrepaired",
          customer_id: customerId,
          technician_id: currentUser.id,
          fault_description: fault,
          images: imageEl.src ? [imageEl.src] : [],
          repair_cost: 0,
          final_cost: 0,
          payment_status: "",
          entry_date: new Date().toISOString(),
          expected_delivery: deliveryDate
            ? new Date(deliveryDate).toISOString()
            : "",
          delivered_date: "",
          created_at: new Date().toISOString(),
        });

        // Save spare parts
        const spItems = document.querySelectorAll(
          "#sparePartsList .spare-part-item",
        );
        for (const item of spItems) {
          const spName = item.querySelector(".sp-name").value.trim();
          if (!spName) continue;
          await db.add("spare_parts", {
            pump_id: pump.id,
            name: spName,
            quantity: parseInt(item.querySelector(".sp-qty").value) || 1,
            price: parseFloat(item.querySelector(".sp-price").value) || 0,
            available: !item.querySelector(".sp-unavailable").checked,
          });
        }

        // Notify customer
        await db.add("notifications", {
          user_id: customerId,
          title: "محرك جديد في الورشة",
          message: `تم تسجيل ${name} في الورشة للتصليح`,
          type: "info",
          priority: "normal",
          icon: "fa-cog",
          read: false,
          created_at: new Date().toISOString(),
        });

        showToast("تم إضافة المحرك بنجاح", "success");
        sparePartsFields = [];
        navigate("pump-list");
      };

      // ==========================================
      // PUMP LIST
      // ==========================================
      let pumpFilter = "all";
      async function renderPumpList(el) {
        const pumps = await db.getAll("pumps");
        let filtered = pumps;
        if (pumpFilter === "unrepaired")
          filtered = pumps.filter((p) => p.status === "unrepaired");
        else if (pumpFilter === "in_progress")
          filtered = pumps.filter((p) => p.status === "in_progress");
        else if (pumpFilter === "ready")
          filtered = pumps.filter((p) => p.status === "ready");
        else if (pumpFilter === "delivered")
          filtered = pumps.filter((p) => p.status === "delivered");

        filtered.sort(
          (a, b) => new Date(b.created_at) - new Date(a.created_at),
        );

        el.innerHTML = `
        <div class="filter-tabs">
            <button class="filter-tab ${pumpFilter === "all" ? "active" : ""}" onclick="setPumpFilter('all')">الكل (${pumps.length})</button>
            <button class="filter-tab ${pumpFilter === "unrepaired" ? "active" : ""}" onclick="setPumpFilter('unrepaired')">غير مصلح (${pumps.filter((p) => p.status === "unrepaired").length})</button>
            <button class="filter-tab ${pumpFilter === "in_progress" ? "active" : ""}" onclick="setPumpFilter('in_progress')">قيد التصليح (${pumps.filter((p) => p.status === "in_progress").length})</button>
            <button class="filter-tab ${pumpFilter === "ready" ? "active" : ""}" onclick="setPumpFilter('ready')">جاهز (${pumps.filter((p) => p.status === "ready").length})</button>
            <button class="filter-tab ${pumpFilter === "delivered" ? "active" : ""}" onclick="setPumpFilter('delivered')">تم التسليم (${pumps.filter((p) => p.status === "delivered").length})</button>
        </div>
        <div class="card">
            <div class="table-container">
                <table>
                    <thead><tr>
                        <th>المحرك</th><th>النوع</th><th>الزبون</th><th>الحالة</th><th>تاريخ الدخول</th><th>الإجراءات</th>
                    </tr></thead>
                    <tbody id="pumpsTableBody"></tbody>
                </table>
            </div>
            ${filtered.length === 0 ? '<div class="empty-state" style="padding:30px;"><i class="fas fa-inbox"></i><p>لا توجد محركات</p></div>' : ""}
        </div>`;

        const tbody = document.getElementById("pumpsTableBody");
        for (const p of filtered) {
          const cust = await db.get("users", p.customer_id);
          tbody.innerHTML += `
            <tr>
                <td><strong>${p.name}</strong><br><small style="color:var(--text-muted)">${p.power || ""}</small></td>
                <td>${p.type}</td>
                <td>${cust ? cust.name : "-"}</td>
                <td><span class="status-badge ${statusClass(p.status)}">${statusText(p.status)}</span></td>
                <td>${formatDate(p.entry_date)}</td>
                <td>
                    <button class="btn btn-primary btn-sm" onclick="showPumpDetail(${p.id})" title="تفاصيل"><i class="fas fa-eye"></i></button>
                    ${
                      p.status !== "delivered"
                        ? `
                    <button class="btn btn-warning btn-sm" onclick="changePumpStatus(${p.id})" title="تغيير الحالة"><i class="fas fa-exchange-alt"></i></button>
                    `
                        : ""
                    }
                    ${
                      p.status === "ready"
                        ? `
                    <button class="btn btn-success btn-sm" onclick="showDeliverModal(${p.id})" title="تسليم"><i class="fas fa-handshake"></i></button>
                    `
                        : ""
                    }
                    <button class="btn btn-danger btn-sm" onclick="deletePump(${p.id})" title="حذف"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        }
      }

      window.setPumpFilter = function (f) {
        pumpFilter = f;
        loadTechAdminPage();
      };

      window.changePumpStatus = async function (id) {
        const pump = await db.get("pumps", id);
        const statusFlow = { unrepaired: "in_progress", in_progress: "ready" };
        const next = statusFlow[pump.status];
        if (!next) {
          showToast("لا يمكن تغيير الحالة", "warning");
          return;
        }
        pump.status = next;
        await db.put("pumps", pump);

        // Notify customer
        const msg =
          next === "in_progress"
            ? `بدأ تصليح ${pump.name}`
            : `${pump.name} جاهز للاستلام`;
        await db.add("notifications", {
          user_id: pump.customer_id,
          title: next === "ready" ? "محرك جاهز!" : "بدء التصليح",
          message: msg,
          type: next === "ready" ? "success" : "info",
          priority: next === "ready" ? "high" : "normal",
          icon: next === "ready" ? "fa-check-circle" : "fa-wrench",
          read: false,
          created_at: new Date().toISOString(),
        });

        showToast(`تم تغيير الحالة إلى: ${statusText(next)}`, "success");
        loadTechAdminPage();
      };

      window.showDeliverModal = async function (pumpId) {
        const pump = await db.get("pumps", pumpId);
        const modal = document.getElementById("modalContent");
        modal.innerHTML = `
        <div class="modal-header">
            <h3><i class="fas fa-handshake" style="color:var(--accent-green);margin-left:8px;"></i> تسليم المحرك</h3>
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <p style="margin-bottom:15px;color:var(--text-secondary);">محرك: <strong>${pump.name}</strong></p>
        <div class="form-group">
            <label>السعر النهائي (${CURRENCY})</label>
            <input type="number" id="deliverCost" value="${pump.repair_cost || pump.final_cost || 0}" placeholder="أدخل السعر النهائي">
        </div>
        <div class="form-group">
            <label>طريقة الدفع</label>
            <select id="deliverPayment">
                <option value="paid">كاش (مدفوع)</option>
                <option value="debt">دين</option>
            </select>
        </div>
        <div id="debtAmountSection" class="hidden form-group">
            <label>المبلغ المدفوع الآن (${CURRENCY})</label>
            <input type="number" id="paidNow" value="0" placeholder="0">
        </div>
        <button class="btn btn-success btn-full" onclick="deliverPump(${pumpId})">
            <i class="fas fa-check"></i> تأكيد التسليم
        </button>`;
        document
          .getElementById("deliverPayment")
          .addEventListener("change", function () {
            document
              .getElementById("debtAmountSection")
              .classList.toggle("hidden", this.value !== "debt");
          });
        document.getElementById("modalOverlay").classList.add("show");
      };

      window.deliverPump = async function (pumpId) {
        const pump = await db.get("pumps", pumpId);
        const cost =
          parseFloat(document.getElementById("deliverCost").value) || 0;
        const paymentType = document.getElementById("deliverPayment").value;
        pump.status = "delivered";
        pump.final_cost = cost;
        pump.payment_status = paymentType;
        pump.delivered_date = new Date().toISOString();
        await db.put("pumps", pump);

        if (paymentType === "debt") {
          const paidNow =
            parseFloat(document.getElementById("paidNow").value) || 0;
          await db.add("debts", {
            customer_id: pump.customer_id,
            pump_id: pump.id,
            total_amount: cost,
            paid_amount: paidNow,
            remaining_amount: cost - paidNow,
            reminder_frequency: "none",
            reminder_day: 1,
            reminder_enabled: false,
            last_reminder_date: "",
            next_reminder_date: "",
            created_at: new Date().toISOString(),
          });
          if (paidNow > 0) {
            await db.add("debt_payments", {
              debt_id: null,
              amount: paidNow,
              date: new Date().toISOString(),
              note: "دفعة عند التسليم",
            });
          }
        }

        await db.add("notifications", {
          user_id: pump.customer_id,
          title: "تم تسليم المحرك",
          message: `تم تسليم ${pump.name} بمبلغ ${formatMoney(cost)} (${paymentType === "paid" ? "مدفوع" : "دين"})`,
          type: paymentType === "paid" ? "success" : "warning",
          priority: "normal",
          icon: "fa-handshake",
          read: false,
          created_at: new Date().toISOString(),
        });

        closeModal();
        showToast("تم تسليم المحرك بنجاح", "success");
        loadTechAdminPage();
      };

      window.deletePump = async function (id) {
        if (!confirm("هل أنت متأكد من حذف هذا المحرك؟")) return;
        await db.delete("pumps", id);
        // Delete related spare parts
        const parts = await db.filter("spare_parts", (sp) => sp.pump_id === id);
        for (const p of parts) await db.delete("spare_parts", p.id);
        showToast("تم حذف المحرك", "success");
        loadTechAdminPage();
      };

      // ==========================================
      // PUMP DETAIL (SHARED)
      // ==========================================
      window.showPumpDetail = async function (id) {
        const pump = await db.get("pumps", id);
        if (!pump) {
          showToast("المحرك غير موجود", "error");
          return;
        }
        const cust = await db.get("users", pump.customer_id);
        const tech = pump.technician_id
          ? await db.get("users", pump.technician_id)
          : null;
        const parts = await db.filter("spare_parts", (sp) => sp.pump_id === id);

        // Check if modal exists (tech/admin view) or use page content (customer)
        const modalEl = document.getElementById("modalContent");
        if (modalEl) {
          modalEl.innerHTML = renderPumpDetailHTML(pump, cust, tech, parts);
          document.getElementById("modalOverlay").classList.add("show");
        } else {
          // For customer, create an overlay
          const overlay = document.createElement("div");
          overlay.className = "modal-overlay show";
          overlay.id = "tempModalOverlay";
          overlay.onclick = function (e) {
            if (e.target === overlay) overlay.remove();
          };
          overlay.innerHTML = `<div class="modal">${renderPumpDetailHTML(pump, cust, tech, parts)}</div>`;
          document.body.appendChild(overlay);
        }
      };

      function renderPumpDetailHTML(pump, cust, tech, parts) {
        return `
        <div class="modal-header">
            <h3><i class="fas fa-cog" style="color:var(--accent-blue);margin-left:8px;"></i> تفاصيل المحرك</h3>
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <div style="display:grid;gap:12px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <h4 style="font-size:18px;">${pump.name}</h4>
                <span class="status-badge ${statusClass(pump.status)}">${statusText(pump.status)}</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:14px;">
                <div><span style="color:var(--text-muted);">النوع:</span> ${pump.type}</div>
                <div><span style="color:var(--text-muted);">القوة:</span> ${pump.power || "-"}</div>
                <div><span style="color:var(--text-muted);">الزبون:</span> ${cust ? cust.name : "-"}</div>
                <div><span style="color:var(--text-muted);">الفني:</span> ${tech ? tech.name : "-"}</div>
                <div><span style="color:var(--text-muted);">تاريخ الدخول:</span> ${formatDate(pump.entry_date)}</div>
                <div><span style="color:var(--text-muted);">التسليم المتوقع:</span> ${formatDate(pump.expected_delivery)}</div>
                ${pump.final_cost ? `<div><span style="color:var(--text-muted);">التكلفة:</span> ${formatMoney(pump.final_cost)}</div>` : ""}
                ${pump.payment_status ? `<div><span style="color:var(--text-muted);">الدفع:</span> ${pump.payment_status === "paid" ? "مدفوع" : "دين"}</div>` : ""}
            </div>
            ${
              pump.fault_description
                ? `
            <div style="background:var(--bg-primary);padding:12px;border-radius:8px;">
                <h5 style="color:var(--accent-yellow);margin-bottom:5px;"><i class="fas fa-exclamation-circle" style="margin-left:5px;"></i> وصف العطل</h5>
                <p style="font-size:13px;line-height:1.8;">${pump.fault_description}</p>
            </div>`
                : ""
            }
            ${
              pump.images && pump.images.length > 0
                ? `
            <div>
                <h5 style="margin-bottom:8px;">صور المحرك</h5>
                ${pump.images.map((img) => `<img src="${img}" class="img-preview" style="display:inline-block;margin-left:8px;">`).join("")}
            </div>`
                : ""
            }
            ${
              parts.length > 0
                ? `
            <div>
                <h5 style="margin-bottom:8px;"><i class="fas fa-tools" style="color:var(--accent-purple);margin-left:5px;"></i> قطع الغيار</h5>
                ${parts
                  .map(
                    (p) => `
                    <div class="spare-part-item">
                        <span class="part-name">${p.name}</span>
                        <span class="part-qty">×${p.quantity}</span>
                        <span class="part-price">${formatMoney(p.price)}</span>
                        <span class="part-status ${p.available ? "available" : "unavailable"}">${p.available ? "متوفرة" : "غير متوفرة"}</span>
                    </div>
                `,
                  )
                  .join("")}
            </div>`
                : ""
            }
        </div>`;
      }

      // ==========================================
      // MISSING SPARE PARTS
      // ==========================================
      async function renderMissingParts(el) {
        const missingParts = await db.filter(
          "spare_parts",
          (sp) => !sp.available,
        );
        el.innerHTML = `
        <div class="card" style="margin-bottom:20px;">
            <div class="card-header">
                <h3><i class="fas fa-exclamation-triangle" style="color:var(--accent-red);margin-left:8px;"></i> قطع الغيار غير المتوفرة (${missingParts.length})</h3>
            </div>
            ${missingParts.length === 0 ? '<div class="empty-state"><i class="fas fa-check-circle" style="color:var(--accent-green);"></i><p>جميع القطع متوفرة!</p></div>' : ""}
            <div class="missing-parts-grid" id="missingPartsGrid"></div>
        </div>`;

        if (missingParts.length > 0) {
          const grid = document.getElementById("missingPartsGrid");
          for (const part of missingParts) {
            const pump = await db.get("pumps", part.pump_id);

                <div class="missing-part-card">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <h4><i class="fas fa-tools" style="margin-left:5px;"></i> ${part.name}</h4>
                            <p class="part-pump"><i class="fas fa-cog" style="margin-left:4px;"></i> ${pump ? pump.name : "محرك غير معروف"}</p>
                            <p style="font-size:12px;color:var(--text-muted);margin-top:4px;">
                                الزبون: ${cust ? cust.name : "-"} | الكمية: ${part.quantity} | السعر: ${formatMoney(part.price)}
                            </p>
                        </div>
                        <button class="btn btn-success btn-sm" onclick="markPartAvailable(${part.id})" title="تحديد كمتوفرة">
                            <i class="fas fa-check"></i>
                        </button>
                    </div>
                </div>`;
          }
        }
      }

      window.markPartAvailable = async function (id) {
        const part = await db.get("spare_parts", id);
        part.available = true;
        await db.put("spare_parts", part);
        showToast("تم تحديد القطعة كمتوفرة", "success");
        loadTechAdminPage();
      };

      // ==========================================
      // DEBTS MANAGEMENT
      // ==========================================
      async function renderDebtsMgmt(el) {
        await processReminders();
        const debts = await db.getAll("debts");
        const activeDebts = debts.filter((d) => d.remaining_amount > 0);
        const paidDebts = debts.filter((d) => d.remaining_amount <= 0);
        const totalRemaining = activeDebts.reduce(
          (s, d) => s + d.remaining_amount,
          0,
        );

        el.innerHTML = `
        <div class="stats-grid">
            <div class="stat-card orange">
                <div class="stat-icon"><i class="fas fa-money-bill-wave"></i></div>
                <div class="stat-value">${formatMoney(totalRemaining)}</div>
                <div class="stat-label">إجمالي الديون المتبقية</div>
            </div>
            <div class="stat-card red">
                <div class="stat-icon"><i class="fas fa-file-invoice-dollar"></i></div>
                <div class="stat-value">${activeDebts.length}</div>
                <div class="stat-label">ديون نشطة</div>
            </div>
            <div class="stat-card green">
                <div class="stat-icon"><i class="fas fa-check-double"></i></div>
                <div class="stat-value">${paidDebts.length}</div>
                <div class="stat-label">ديون مسددة</div>
            </div>
        </div>

        <div style="margin-bottom:15px;">
            <button class="btn btn-warning btn-sm" onclick="runAllReminders()">
                <i class="fas fa-bell"></i> تشغيل التذكيرات المستحقة
            </button>
        </div>

        <div class="card">
            <div class="card-header"><h3>الديون النشطة</h3></div>
            <div id="debtsListContainer"></div>
        </div>`;

        const container = document.getElementById("debtsListContainer");
        if (activeDebts.length === 0) {
          container.innerHTML =
            '<div class="empty-state"><i class="fas fa-check-circle" style="color:var(--accent-green);"></i><p>لا توجد ديون مستحقة</p></div>';
          return;
        }

        for (const d of activeDebts) {
          const cust = await db.get("users", d.customer_id);
          const pump = d.pump_id ? await db.get("pumps", d.pump_id) : null;
          const pct = Math.round((d.paid_amount / d.total_amount) * 100);
          container.innerHTML += `
            <div class="pump-item" style="flex-direction:column;align-items:stretch;margin-bottom:12px;padding:15px;">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <h4 style="font-size:15px;font-weight:700;">${cust ? cust.name : "غير معروف"}</h4>
                        <p style="font-size:12px;color:var(--text-muted);">${pump ? pump.name : "محرك محذوف"} | الإجمالي: ${formatMoney(d.total_amount)}</p>
                        <p style="font-size:12px;color:var(--text-muted);">المدفوع: ${formatMoney(d.paid_amount)} | المتبقي: <strong style="color:var(--accent-red);">${formatMoney(d.remaining_amount)}</strong></p>
                    </div>
                    <div style="display:flex;gap:5px;flex-wrap:wrap;">
                        <button class="btn btn-success btn-sm" onclick="showPayDebtModal(${d.id})"><i class="fas fa-money-bill"></i> تسديد</button>
                        <button class="btn btn-secondary btn-sm" onclick="showDebtReminderSettings(${d.id})"><i class="fas fa-bell"></i></button>
                        <button class="btn btn-warning btn-sm" onclick="sendInstantReminder(${d.id})"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
                <div class="progress-bar"><div class="progress-fill green" style="width:${pct}%"></div></div>
                <div style="display:flex;justify-content:space-between;margin-top:6px;">
                    <span style="font-size:11px;color:var(--text-muted);">تم السداد ${pct}%</span>
                    <span class="chip ${d.reminder_enabled ? "active" : "inactive"}">${d.reminder_enabled ? (d.reminder_frequency === "weekly" ? "أسبوعي" : "شهري") : "بدون تذكير"}</span>
                </div>
            </div>`;
        }
      }

      window.showPayDebtModal = async function (debtId) {
        const debt = await db.get("debts", debtId);
        const modal = document.getElementById("modalContent");
        modal.innerHTML = `
        <div class="modal-header">
            <h3><i class="fas fa-money-bill" style="color:var(--accent-green);margin-left:8px;"></i> تسديد دفعة</h3>
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <p style="margin-bottom:10px;">المتبقي: <strong style="color:var(--accent-red);">${formatMoney(debt.remaining_amount)}</strong></p>
        <div class="form-group">
            <label>المبلغ المدفوع (${CURRENCY})</label>
            <input type="number" id="payAmount" max="${debt.remaining_amount}" placeholder="أدخل المبلغ">
        </div>
        <div class="form-group">
            <label>ملاحظة (اختياري)</label>
            <input type="text" id="payNote" placeholder="ملاحظة...">
        </div>
        <button class="btn btn-success btn-full" onclick="payDebt(${debtId})"><i class="fas fa-check"></i> تأكيد الدفع</button>`;
        document.getElementById("modalOverlay").classList.add("show");
      };

      window.payDebt = async function (debtId) {
        const debt = await db.get("debts", debtId);
        const amount =
          parseFloat(document.getElementById("payAmount").value) || 0;
        const note = document.getElementById("payNote").value.trim();
        if (amount <= 0 || amount > debt.remaining_amount) {
          showToast("مبلغ غير صحيح", "error");
          return;
        }
        debt.paid_amount += amount;
        debt.remaining_amount -= amount;
        await db.put("debts", debt);
        await db.add("debt_payments", {
          debt_id: debtId,
          amount,
          date: new Date().toISOString(),
          note: note || "دفعة",
        });

        await db.add("notifications", {
          user_id: debt.customer_id,
          title: "تم تسديد دفعة",
          message: `تم تسديد ${formatMoney(amount)}. المتبقي: ${formatMoney(debt.remaining_amount)}`,
          type: "success",
          priority: "normal",
          icon: "fa-money-bill-wave",
          read: false,
          created_at: new Date().toISOString(),
        });

        closeModal();
        showToast("تم تسديد الدفعة بنجاح", "success");
        loadTechAdminPage();
      };

      window.showDebtReminderSettings = async function (debtId) {
        const debt = await db.get("debts", debtId);
        const modal = document.getElementById("modalContent");
        modal.innerHTML = `
        <div class="modal-header">
            <h3><i class="fas fa-bell" style="color:var(--accent-yellow);margin-left:8px;"></i> إعدادات التذكير</h3>

                <option value="monthly" ${debt.reminder_frequency === "monthly" ? "selected" : ""}>شهري</option>
            </select>
        </div>
        <div class="form-group" id="weeklyDayGroup" class="${debt.reminder_frequency !== "weekly" ? "hidden" : ""}">

      window.saveReminderSettings = async function (debtId) {
        const debt = await db.get("debts", debtId);
        const freq = document.getElementById("reminderFreq").value;
        const enabled = document.getElementById("reminderEnabled").checked;
        debt.reminder_frequency = freq;
        debt.reminder_enabled = enabled && freq !== "none";
        if (freq === "weekly") {
          debt.reminder_day = parseInt(
            document.getElementById("reminderWeekDay").value,
          );
        } else if (freq === "monthly") {
          debt.reminder_day =
            parseInt(document.getElementById("reminderMonthDay").value) || 1;
        }
        debt.next_reminder_date = debt.reminder_enabled
          ? getNextReminderDate(debt.reminder_frequency, debt.reminder_day)
          : "";

        showToast("تم حفظ إعدادات التذكير", "success");

      // ==========================================
      // MESSAGES (SHARED)
      // ==========================================
      let activeChatUser = null;
      async function renderMessages(el) {
        const isCustomer = currentUser.user_type === "customer";
        // Get conversations
        const allMessages = await db.getAll("messages");
        const myMessages = allMessages.filter(
          (m) =>
            m.sender_id === currentUser.id || m.receiver_id === currentUser.id,
        );

        // Build conversation list
        const convMap = {};
        myMessages.forEach((m) => {
          const otherId =
            m.sender_id === currentUser.id ? m.receiver_id : m.sender_id;
          if (
            !convMap[otherId] ||
            new Date(m.created_at) > new Date(convMap[otherId].created_at)
          ) {
            convMap[otherId] = m;
          }
        });

        // If customer, also show technicians they can talk to
        if (isCustomer) {
          const techs = await db.filter(
            "users",
            (u) => u.user_type === "technician" || u.user_type === "admin",
          );
          techs.forEach((t) => {
            if (!convMap[t.id]) convMap[t.id] = null;
          });
        } else {
          const customers = await db.filter(
            "users",
            (u) => u.user_type === "customer",
          );
          customers.forEach((c) => {
            if (!convMap[c.id]) convMap[c.id] = null;
          });
        }

        el.innerHTML = `
        <div class="chat-container">
            <div class="chat-list" id="chatList"></div>
            <div class="chat-window" id="chatWindow">
                <div class="empty-state" style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;">
                    <i class="fas fa-comments" style="font-size:48px;color:var(--text-muted);margin-bottom:15px;"></i>
                    <p>اختر محادثة للبدء</p>
                </div>
            </div>
        </div>`;

        const chatList = document.getElementById("chatList");
        for (const [uid, lastMsg] of Object.entries(convMap)) {
          const user = await db.get("users", parseFloat(uid));
          if (!user) continue;
          const unread = myMessages.filter(
            (m) =>
              m.sender_id === parseFloat(uid) &&
              m.receiver_id === currentUser.id &&
              !m.read,
          ).length;
          chatList.innerHTML += `
            <div class="chat-item ${activeChatUser === parseFloat(uid) ? "active" : ""}" onclick="openChat(${uid})">
                <div class="chat-avatar">${user.name.charAt(0)}</div>
                <div class="chat-preview">
                    <h4>${user.name}</h4>
                    <p>${lastMsg ? lastMsg.content : "ابدأ محادثة..."}</p>
                </div>
                ${unread > 0 ? '<div class="unread-dot"></div>' : ""}
            </div>`;
        }
      }

      window.openChat = async function (userId) {
        activeChatUser = parseFloat(userId);
        const user = await db.get("users", activeChatUser);
        if (!user) return;

        // Mark messages as read
        const unreadMsgs = await db.filter(
          "messages",
          (m) =>
            m.sender_id === activeChatUser &&
            m.receiver_id === currentUser.id &&
            !m.read,
        );
        for (const m of unreadMsgs) {
          m.read = true;
          await db.put("messages", m);
        }

        const chatWindow = document.getElementById("chatWindow");
        chatWindow.innerHTML = `
        <div class="chat-header-bar">
            <div class="chat-avatar" style="width:36px;height:36px;font-size:14px;">${user.name.charAt(0)}</div>
            <div><h4 style="font-size:14px;">${user.name}</h4><p style="font-size:11px;color:var(--text-muted);">${user.user_type === "customer" ? "زبون" : user.user_type === "admin" ? "مدير" : "فني"}</p></div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-bar">
            <input type="text" id="chatInput" placeholder="اكتب رسالة..." onkeydown="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>`;

        await loadChatMessages();

        // Update chat list active state
        document
          .querySelectorAll(".chat-item")
          .forEach((item) => item.classList.remove("active"));
        event.target.closest(".chat-item")?.classList.add("active");
      };

      async function loadChatMessages() {
        if (!activeChatUser) return;
        const allMsgs = await db.getAll("messages");
        const msgs = allMsgs
          .filter(
            (m) =>
              (m.sender_id === currentUser.id &&
                m.receiver_id === activeChatUser) ||
              (m.sender_id === activeChatUser &&
                m.receiver_id === currentUser.id),
          )
          .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

        const container = document.getElementById("chatMessages");
        if (!container) return;
        container.innerHTML = msgs
          .map(
            (m) => `
            <div class="message-bubble ${m.sender_id === currentUser.id ? "sent" : "received"}">
                ${m.content}
                <div class="message-time">${formatDateTime(m.created_at)}</div>
            </div>
        `,
          )
          .join("");
        container.scrollTop = container.scrollHeight;
      }

      window.sendMessage = async function () {
        const input = document.getElementById("chatInput");
        const content = input.value.trim();
        if (!content || !activeChatUser) return;
        await db.add("messages", {
          sender_id: currentUser.id,
          receiver_id: activeChatUser,
          content,
          pump_id: null,
          read: false,
          created_at: new Date().toISOString(),
        });
        // Add notification for receiver
        await db.add("notifications", {
          user_id: activeChatUser,
          title: "رسالة جديدة",
          message: `رسالة من ${currentUser.name}: ${content.substring(0, 50)}...`,
          type: "info",
          priority: "normal",
          icon: "fa-envelope",
          read: false,
          created_at: new Date().toISOString(),
        });
        input.value = "";
        await loadChatMessages();
      };
