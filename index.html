                <div class="stat-label">إجمالي المحصّل</div>
            </div>
            <div class="stat-card red">
                <div class="stat-icon"><i class="fas fa-file-invoice-dollar"></i></div>
                <div class="stat-value">${formatMoney(totalDebt)}</div>
                <div class="stat-label">إجمالي الديون المتبقية</div>
            </div>
            <div class="stat-card purple">
                <div class="stat-icon"><i class="fas fa-calendar-alt"></i></div>
                <div class="stat-value">${thisMonthPumps.length}</div>
                <div class="stat-label">محركات هذا الشهر</div>
            </div>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-header"><h3><i class="fas fa-chart-pie" style="color:var(--accent-blue);margin-left:8px;"></i> توزيع حالات المحركات</h3></div>
                <div style="padding:10px;">
                    ${["unrepaired", "in_progress", "ready", "delivered"]
                      .map((s) => {
                        const count = pumps.filter(
                          (p) => p.status === s,
                        ).length;
                        const pct = pumps.length
                          ? Math.round((count / pumps.length) * 100)
                          : 0;
                        const colors = {
                          unrepaired: "var(--accent-red)",
                          in_progress: "var(--accent-yellow)",
                          ready: "var(--accent-green)",
                          delivered: "var(--accent-blue)",
                        };
                        return `
                        <div style="margin-bottom:12px;">
                            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
                                <span>${statusText(s)}</span>
                                <span>${count} (${pct}%)</span>
                            </div>
                            <div class="progress-bar">
                                <div style="height:100%;width:${pct}%;background:${colors[s]};border-radius:4px;transition:width 0.5s;"></div>
                            </div>
                        </div>`;
                      })
                      .join("")}
                </div>
            </div>
            <div class="card">
                <div class="card-header"><h3><i class="fas fa-users" style="color:var(--accent-purple);margin-left:8px;"></i> أكثر الزبائن نشاطاً</h3></div>
                <div id="topCustomers"></div>
            </div>
        </div>`;

        const topCustEl = document.getElementById("topCustomers");
        const custPumps = {};
        pumps.forEach((p) => {
          custPumps[p.customer_id] = (custPumps[p.customer_id] || 0) + 1;
        });
        const sorted = Object.entries(custPumps)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 5);
        for (const [cid, count] of sorted) {
          const cust = await db.get("users", parseFloat(cid));
          topCustEl.innerHTML += `
            <div class="pump-item">
                <div class="pump-info">
                    <h4>${cust ? cust.name : "غير معروف"}</h4>
                    <p>${count} محرك</p>
                </div>
            </div>`;
        }
      }

      // ==========================================
      // MODAL HELPERS
      // ==========================================
      window.closeModal = function () {
        const overlay = document.getElementById("modalOverlay");
        if (overlay) overlay.classList.remove("show");
        const temp = document.getElementById("tempModalOverlay");
        if (temp) temp.remove();
      };

      // ==========================================
      // LOGOUT
      // ==========================================
      window.handleLogout = function () {
        clearSession();
        activeChatUser = null;
        if (notifInterval) clearInterval(notifInterval);
        currentPage = "login";
        render();
        showToast("تم تسجيل الخروج", "info");
      };

      // ==========================================
      // INITIALIZE APP
      // ==========================================
      async function initApp() {
        try {
          await db.init();
          await seedData();
          if (loadSession()) {
            // Re-fetch user data from DB to get latest
            const freshUser = await db.get("users", currentUser.id);
            if (freshUser) {
              currentUser = freshUser;
              saveSession(freshUser);
              currentPage = "dashboard";
            } else {
              clearSession();
            }
          }
          render();
        } catch (e) {
          console.error("Init error:", e);
          showToast("خطأ في تهيئة التطبيق", "error");
        }
      }

      initApp();
    </script>
  </body>
</html>
